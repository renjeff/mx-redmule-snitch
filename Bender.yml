package:
  name: mx-redmule-snitch
  authors:
    - "msc25h32"

dependencies:
  redmule:            { git: "https://github.com/renjeff/redmule.git", rev: "cd50083" }
  hci:                { git: "https://github.com/pulp-platform/hci.git", rev: "f7fbfcd" }

sources:
  # All hw files are compiled by the parent snitch_cluster package
  # (they depend on snitch_cluster_pkg and reqrsp_pkg defined there)
  - target: mx_redmule_snitch_hw
    files:
      - hw/snitch_hwpe_subsystem.sv
      - hw/snitch_tcdm_aligner.sv
      - hw/cluster_tile.sv
